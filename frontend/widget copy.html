<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Météo Bretagne</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #020617;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .city-label {
      background: #020617;
      color: #e5e7eb;
      border: 1px solid #38bdf8;
      border-radius: 10px;
      padding: 4px 7px;
      font-size: 11px;
      font-weight: 800;
      box-shadow: 0 6px 18px rgba(0,0,0,.45);
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: #020617;
      color: #e5e7eb;
    }

    #last-update {
      position: fixed;
      bottom: 12px;
      left: 12px;
      z-index: 9999;
      background: rgba(2, 6, 23, 0.9);
      color: #e5e7eb;
      border: 1px solid #38bdf8;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div id="last-update">Actualisation...</div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const API_BASE_URL = "https://xn--mto-bretagne-bebb.loto-tracker.fr";

    /*const map = L.map("map", {
      zoomControl: true,
      attributionControl: true
    }).setView([48.12, -2.85], 8);*/

    const params = new URLSearchParams(window.location.search);

    const lat = parseFloat(params.get("lat")) || 48.1173;
    const lon = parseFloat(params.get("lon")) || -1.6778;
    const zoom = parseInt(params.get("zoom"), 10) || 8;

    const map = L.map("map", {
      zoomControl: true,
      attributionControl: true
    }).setView([lat, lon], zoom);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap"
    }).addTo(map);

    const layer = L.layerGroup().addTo(map);

    function couleurSelonTemperature(temp) {
      temp = Number(temp);
      if (temp < 8) return "#38bdf8";
      if (temp < 14) return "#22c55e";
      if (temp < 20) return "#eab308";
      if (temp < 27) return "#fb923c";
      return "#ef4444";
    }

    function iconeMeteo(code) {
      const c = Number(code);
      if (c === 0) return "☀️";
      if ([1, 2].includes(c)) return "🌤️";
      if (c === 3) return "☁️";
      if ([61, 63, 65, 80, 81, 82].includes(c)) return "🌧️";
      if ([95, 96, 99].includes(c)) return "⛈️";
      return "🌡️";
    }

    async function chargerCarte() {
      try {
        const response = await fetch(`${API_BASE_URL}/api/meteo/bretagne`);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status} - ${response.statusText}`);
        }

        const villes = await response.json();

        console.log("Données météo reçues :", villes);

        document.getElementById("last-update").textContent =
          "Dernière actualisation : " +
          new Date().toLocaleTimeString("fr-FR", {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          });

        layer.clearLayers();

        villes.forEach(v => {
          const color = couleurSelonTemperature(v.temperature);

          const marker = L.circleMarker([v.lat, v.lon], {
            radius: 11,
            color,
            fillColor: color,
            fillOpacity: 0.9,
            weight: 3
          }).addTo(layer);

          marker.bindTooltip(
            `${v.ville} ${iconeMeteo(v.code_meteo)} ${v.temperature}°C`,
            {
              permanent: true,
              direction: "top",
              className: "city-label"
            }
          );

          marker.bindPopup(`
            <strong>${v.ville}</strong><br>
            🌡️ ${v.temperature} °C<br>
            🌧️ ${v.pluie_mm} mm<br>
            💨 ${v.rafales_kmh} km/h<br>
            ⚠️ ${v.risque}
          `);
        });

      } catch (error) {
        document.getElementById("last-update").textContent =
          "Dernière tentative échouée";

        console.error("Erreur météo :", error);
      }
    }

    chargerCarte();
    setInterval(chargerCarte, 600000);
  </script>
</body>
</html>
